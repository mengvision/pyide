version: '3.8'

# PyIDE LAN Deployment Configuration
# This configuration is optimized for local area network access

services:
  # PostgreSQL Database
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pyide_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pyide_secure_password_2024}
      POSTGRES_DB: ${POSTGRES_DB:-pyide}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Expose to LAN only if needed for external database tools
    # ports:
    #   - "5432:5432"
    networks:
      - pyide-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7
    # Not exposed to LAN - only internal use
    networks:
      - pyide-network
    restart: unless-stopped

  # FastAPI Backend Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT:-8000}
    volumes:
      - pyide_data:/pyide-data
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"  # Accessible from LAN
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pyide_user}:${POSTGRES_PASSWORD:-pyide_secure_password_2024}@db/pyide
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      PYIDE_DATA_DIR: /pyide-data
      # Allow access from LAN IPs
      ALLOWED_ORIGINS: '["http://localhost:3000", "http://127.0.0.1:3000", "http://0.0.0.0:3000"]'
    depends_on:
      - db
      - redis
    networks:
      - pyide-network
    restart: unless-stopped

  # Web Frontend (React SPA with Nginx)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"  # Accessible from LAN
    depends_on:
      - api
    environment:
      # VITE_API_URL is used at BUILD time; at runtime nginx
      # proxies /api and /ws directly to the 'api' service.
      # Build-time only; at runtime Nginx proxies to api:8000 internally
      - VITE_API_URL=http://localhost:${API_PORT:-8000}
    networks:
      - pyide-network
    restart: unless-stopped

volumes:
  postgres_data:
  pyide_data:

networks:
  pyide-network:
    driver: bridge
