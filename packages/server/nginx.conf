# =============================================================================
# PyIDE nginx reverse-proxy configuration
#
# Prerequisites:
#   1. Place your TLS certificate at  ./certs/cert.pem
#   2. Place your private key at       ./certs/key.pem
#   3. Start with:  docker compose --profile https up
#
# For local development without certificates you can use a self-signed cert:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#           -keyout certs/key.pem -out certs/cert.pem \
#           -subj "/CN=localhost"
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------------
    # Redirect all plain-HTTP traffic to HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS – TLS termination + proxy to FastAPI
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        # TLS certificates (mounted from ./certs via docker-compose volume)
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Modern TLS settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # -----------------------------------------------------------------------
        # REST API + regular HTTP endpoints
        # -----------------------------------------------------------------------
        location / {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Request body size (should match FastAPI MAX_REQUEST_SIZE = 10 MB)
            client_max_body_size 10m;
        }

        # -----------------------------------------------------------------------
        # WebSocket endpoint  (/ws/*)
        # -----------------------------------------------------------------------
        location /ws/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;

            # Required for WebSocket upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep long-lived WebSocket connections alive
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
